<section class="page">
  <div class="page__header">
    <div class="page__title">
      <h1>Admin Users</h1>
      <p>This page is protected by the ADMIN role and lists users from the backend.</p>
    </div>

    <div class="actions">
      <button type="button" (click)="addUser()">Add User</button>
      <button type="button" class="button button--secondary" (click)="loadUsers()">Refresh</button>
    </div>
  </div>

  <div class="card">
    <div class="error-text" *ngIf="loadError">{{ loadError }}</div>
    <div *ngIf="loading">Loading users...</div>

    <div class="table-wrap" *ngIf="!loading">
      <table *ngIf="users.length > 0; else emptyUsers">
        <thead>
          <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Phone</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let user of users">
            <td>{{ user.firstName }}</td>
            <td>{{ user.lastName }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.phone || '—' }}</td>
          </tr>
        </tbody>
      </table>

      <ng-template #emptyUsers>
        <p class="empty-state">No users were returned by the backend yet.</p>
      </ng-template>
    </div>
  </div>
</section>
