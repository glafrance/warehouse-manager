spring.application.name=warehouse-api

# Base settings used across environments
server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Expose only the actuator endpoints we need
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/warehouse_db}
spring.datasource.username=${DB_USERNAME:warehouse_user}
spring.datasource.password=${DB_PASSWORD:warehouse_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Frontend origin for CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:15}
app.security.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:7}
