spring.application.name=warehouse-api

spring.datasource.url=jdbc:h2:mem:warehouse_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

app.cors.allowed-origins=http://localhost:4200
app.security.jwt.secret=${JWT_SECRET}
#app.security.jwt.secret=${JWT_SECRET:4d622928fded3c78587cd64b69e2e85f16241e7dbbcf4160bf857e2593eb17e2}
app.security.jwt.access-token-minutes=15
app.security.jwt.refresh-token-days=7
